    container_name: ms-estadisticas
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - DB_HOST=mysql-estadisticas
      - DB_PORT=3306
      - DB_NAME=ms-estadisticas
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-estadisticas
      - ms-eureka
    networks:
      - backend-network

  ms-juegos:
    build: ./ms-juegos
    container_name: ms-juegos
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - DB_HOST=mysql-juegos
      - DB_PORT=3306
      - DB_NAME=ms-juegos
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-juegos
      - ms-eureka
    networks:
      - backend-network

  ms-jugadores:
    build: ./ms-jugadores
    container_name: ms-jugadores
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=mysql-jugadores
      - DB_PORT=3306
      - DB_NAME=ms-jugadores
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-jugadores
      - ms-eureka
    networks:
      - backend-network

  ms-partidas:
    build: ./ms-partidas
    container_name: ms-partidas
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - DB_HOST=mysql-partidas
      - DB_PORT=3306
      - DB_NAME=ms-partidas
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-partidas
      - ms-eureka
    networks:
      - backend-network

  ms-torneos:
    build: ./ms-torneos
    container_name: ms-torneos
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DB_HOST=mysql-torneos
      - DB_PORT=3306
      - DB_NAME=ms-torneos
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-torneos
      - ms-eureka
    networks:
      - backend-network
      
networks:
  backend-network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_equipos_data:
  mysql_estadisticas_data:
  mysql_juegos_data:
  mysql_jugadores_data:
  mysql_partidas_data:
  mysql_torneos_data: