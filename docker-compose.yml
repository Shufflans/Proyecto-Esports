  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=mysql-auth
      - DB_PORT=3306
      - DB_NAME=ms-auth
      - DB_USER=appuser
      - DB_PASSWORD=1234
      - JWT_SECRET=clave_super_secreta_12345678901234567890
