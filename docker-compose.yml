    environment:
      - EUREKA_URL=http://ms-eureka:8761/eureka/
    depends_on:
      - ms-eureka
      - ms-auth
      - ms-equipos
      - ms-estadisticas
      - ms-juegos
      - ms-jugadores
      - ms-partidas
      - ms-torneos
